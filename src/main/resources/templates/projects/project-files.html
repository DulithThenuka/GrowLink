<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.title + ' Files | GrowLink'}">Project Files | GrowLink</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .container {
            width: 92%;
            max-width: 1150px;
            margin: 30px auto;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .muted {
            color: #6b7280;
        }

        .success-message {
            background: #dcfce7;
            color: #166534;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 18px;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 13px;
        }

        .link-btn {
            text-decoration: none;
            display: inline-block;
        }

        .stats-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: #e0f2fe;
            color: #0369a1;
            font-size: 13px;
            font-weight: 700;
        }

        .upload-box {
            border: 2px dashed #d1d5db;
            border-radius: 14px;
            padding: 22px;
            background: #fafafa;
        }

        input[type="file"] {
            width: 100%;
            margin: 12px 0 16px;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .file-item {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 18px;
            background: #fcfcfd;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .file-title {
            margin: 0 0 8px;
            font-weight: 700;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .empty {
            color: #6b7280;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .file-item {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div th:if="${message != null and !#strings.isEmpty(message)}" class="success-message" th:text="${message}">
        Action completed.
    </div>

    <div class="card">
        <div class="top-bar">
            <div>
                <h1 style="margin:0;" th:text="${project.title + ' File Sharing'}">Project Files</h1>
                <p class="muted" style="margin:8px 0 0;">Upload and manage shared files for this project.</p>
            </div>

            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                <span class="stats-badge">
                    Files: <span th:text="${fileCount}">0</span>
                </span>

                <a class="link-btn" th:href="@{/projects/{projectId}(projectId=${project.id})}">
                    <button type="button" class="btn btn-secondary">Back to Project</button>
                </a>
            </div>
            <a class="link-btn" th:href="@{/projects/{projectId}/tasks(projectId=${project.id})}">
    <button type="button" class="btn btn-secondary">Tasks</button>
</a>

<a class="link-btn" th:href="@{/projects/{projectId}/chat(projectId=${project.id})}">
    <button type="button" class="btn btn-secondary">Chat</button>
</a>

<a class="link-btn" th:href="@{/projects/{projectId}/analytics(projectId=${project.id})}">
    <button type="button" class="btn btn-secondary">Analytics</button>
</a>
        </div>
    </div>

    <div class="card">
        <h2 style="margin-top:0;">Upload File</h2>

        <div class="upload-box">
            <form th:action="@{/projects/{projectId}/files/upload(projectId=${project.id})}" method="post" enctype="multipart/form-data">
                <label for="file"><strong>Select file</strong></label>
                <input id="file" type="file" name="file" required>
                <button type="submit" class="btn btn-primary">Upload File</button>
            </form>
        </div>
    </div>

    <div class="card">
        <h2 style="margin-top:0;">Shared Files</h2>

        <div th:if="${#lists.isEmpty(files)}" class="empty">
            No files uploaded yet.
        </div>

        <div class="file-list" th:if="${!#lists.isEmpty(files)}">
            <div class="file-item" th:each="fileItem : ${files}">
                <div>
                    <p class="file-title" th:text="${fileItem.originalFileName}">Document.pdf</p>

                    <p class="muted" th:if="${fileItem.uploadedBy != null}">
                        Uploaded by:
                        <strong th:text="${fileItem.uploadedBy.fullName}">User Name</strong>
                    </p>

                    <p class="muted" th:if="${fileItem.fileType != null and !#strings.isEmpty(fileItem.fileType)}">
                        Type:
                        <strong th:text="${fileItem.fileType}">application/pdf</strong>
                    </p>

                    <p class="muted">
                        Size:
                        <strong th:text="${projectFileService.formatFileSize(fileItem.fileSize)}">1.2 MB</strong>
                    </p>

                    <p class="muted" th:if="${fileItem.uploadedAt != null}">
                        Uploaded at:
                        <strong th:text="${#temporals.format(fileItem.uploadedAt, 'yyyy-MM-dd HH:mm')}">2026-04-11 20:00</strong>
                    </p>
                </div>

                <div class="actions">
                    <a th:href="@{/projects/{projectId}/files/{fileId}/download(projectId=${project.id}, fileId=${fileItem.id})}">
                        <button type="button" class="btn btn-secondary btn-sm">Download</button>
                    </a>

                    <form th:if="${isOwner or (fileItem.uploadedBy != null and #authentication != null and #authentication.name == fileItem.uploadedBy.email)}"
                          th:action="@{/projects/{projectId}/files/{fileId}/delete(projectId=${project.id}, fileId=${fileItem.id})}"
                          method="post">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
