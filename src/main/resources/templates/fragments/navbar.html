<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar">
    <div class="container nav-inner">
        <a th:href="@{/}" class="brand">GrowLink</a>

        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/explore/users}">Explore Users</a>
            <a th:href="@{/explore/projects}">Explore Projects</a>
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/profile}">My Profile</a>
            <a th:href="@{/projects}">Projects</a>
            <a th:href="@{/messages}">Messages</a>

            <a th:href="@{/notifications}" class="nav-notification-link">
                <i class="fa-regular fa-bell"></i>
                <span>Notifications</span>
                <span class="mini-notification-badge"
                      th:if="${loggedUser != null and unreadNotificationCount != null and unreadNotificationCount > 0}"
                      th:text="${unreadNotificationCount}">0</span>
            </a>

            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
