<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('View Profile - GrowLink')}"></head>
<link rel="stylesheet" th:href="@{/css/profile.css}">
<link rel="stylesheet" th:href="@{/css/skills.css}">
<link rel="stylesheet" th:href="@{/css/projects.css}">
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="profile-page">
    <div class="container">

        <section class="skills-card profile-card">
            <div class="profile-top">
                <div class="profile-identity">
                    <div class="profile-avatar-large">
                        <img th:if="${profileUser.profileImage != null and !#strings.isEmpty(profileUser.profileImage)}"
                             th:src="@{${profileUser.profileImage}}"
                             alt="Profile Image">
                        <span th:if="${profileUser.profileImage == null or #strings.isEmpty(profileUser.profileImage)}"
                              th:text="${#strings.substring(profileUser.fullName,0,1)}">U</span>
                    </div>

                    <div class="profile-info">
                        <h1 th:text="${profileUser.fullName}">Full Name</h1>
                        <p class="profile-headline"
                           th:text="${profileUser.headline != null and !#strings.isEmpty(profileUser.headline) ? profileUser.headline : 'No headline added yet.'}">
                            Headline
                        </p>
                        <p class="profile-location"
                           th:text="${profileUser.location != null and !#strings.isEmpty(profileUser.location) ? profileUser.location : 'No location added.'}">
                            Location
                        </p>
                        <p class="profile-email" th:text="${profileUser.email}">email@gmail.com</p>
                    </div>
                </div>

                <div class="profile-actions">
                    <a th:if="${loggedUser != null and loggedUser.id == profileUser.id}"
                       th:href="@{/profile/edit}"
                       class="btn btn-primary">Edit Profile</a>

                    <form th:if="${loggedUser != null and loggedUser.id != profileUser.id}"
                          th:action="@{/messages/start}"
                          method="post">
                        <input type="hidden" name="otherUserId" th:value="${profileUser.id}">
                        <button type="submit" class="btn btn-primary">Message</button>
                    </form>

                    <a th:href="@{/connections}" class="btn btn-secondary">Connections</a>
                </div>
            </div>

            <div class="profile-bio-box">
                <h3>About</h3>
                <p th:text="${profileUser.bio != null and !#strings.isEmpty(profileUser.bio) ? profileUser.bio : 'No bio added yet.'}">
                    Bio
                </p>
            </div>
        </section>

        <section class="skills-card">
            <h2>Reviews</h2>

            <p><strong>Average Rating:</strong> <span th:text="${averageRating}">0</span></p>
            <p><strong>Total Reviews:</strong> <span th:text="${reviewCount}">0</span></p>

            <div th:if="${#lists.isEmpty(reviews)}" class="empty-state">
                No reviews yet.
            </div>

            <div th:each="review : ${reviews}" class="project-item">
                <h3 th:text="${review.reviewer.fullName}">Reviewer</h3>
                <p><strong>Rating:</strong> <span th:text="${review.rating}">5</span>/5</p>
                <p th:text="${review.comment != null and !#strings.isEmpty(review.comment) ? review.comment : 'No comment provided.'}">
                    Comment
                </p>
            </div>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
