<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | GrowLink</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .container {
            width: 92%;
            max-width: 1100px;
            margin: 30px auto;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .muted {
            color: #6b7280;
        }

        .success-message {
            background: #dcfce7;
            color: #166534;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 18px;
        }

        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: #e0f2fe;
            color: #0369a1;
            font-size: 13px;
            font-weight: 700;
        }

        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .notification-item {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 18px;
            background: #fcfcfd;
        }

        .notification-item.unread {
            border-left: 5px solid #2563eb;
            background: #f8fbff;
        }

        .notification-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .notification-title {
            margin: 0 0 8px;
            font-size: 18px;
        }

        .notification-message {
            margin: 0;
            line-height: 1.6;
            color: #374151;
        }

        .notification-meta {
            color: #6b7280;
            font-size: 13px;
            margin-top: 12px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .empty {
            color: #6b7280;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">

    <div th:if="${message != null and !#strings.isEmpty(message)}" class="success-message" th:text="${message}">
        Done.
    </div>

    <div class="card">
        <div class="top-bar">
            <div>
                <h1 style="margin:0;">Notifications</h1>
                <p class="muted" style="margin:8px 0 0;">Track your latest project and task updates.</p>
            </div>

            <div class="actions">
                <span class="badge">
                    Unread: <span th:text="${unreadCount}">0</span>
                </span>

                <form th:if="${unreadCount > 0}" th:action="@{/notifications/read-all}" method="post">
                    <button type="submit" class="btn btn-secondary">Mark All Read</button>
                </form>
            </div>
        </div>
    </div>

    <div class="card">
        <div th:if="${#lists.isEmpty(notifications)}" class="empty">
            No notifications yet.
        </div>

        <div class="notification-list" th:if="${!#lists.isEmpty(notifications)}">
            <div class="notification-item"
                 th:each="notification : ${notifications}"
                 th:classappend="${!notification.read} ? ' unread' : ''">

                <div class="notification-top">
                    <div>
                        <h3 class="notification-title" th:text="${notification.title}">Notification Title</h3>
                        <p class="notification-message" th:text="${notification.message}">Notification message here.</p>
                    </div>

                    <div class="badge" th:text="${notification.type}">TASK</div>
                </div>

                <div class="notification-meta">
                    <span th:text="${notification.createdAt != null ? #temporals.format(notification.createdAt, 'yyyy-MM-dd HH:mm') : ''}">
                        2026-04-11 20:10
                    </span>
                </div>

                <div class="actions" th:if="${!notification.read}">
                    <form th:action="@{/notifications/{notificationId}/read(notificationId=${notification.id})}" method="post">
                        <button type="submit" class="btn btn-primary">Mark as Read</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
