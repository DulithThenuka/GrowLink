<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Messages - GrowLink')}"></head>
<link rel="stylesheet" th:href="@{/css/projects.css}">
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="projects-page">
    <div class="container">

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <div class="projects-grid">
            <section class="skills-card">
                <h2>Conversations</h2>

                <div th:if="${#lists.isEmpty(conversations)}" class="empty-state">
                    No conversations yet. Start messaging people from Explore Users or their profile page.
                </div>

                <a th:each="conversation : ${conversations}"
                   th:href="@{/messages(conversationId=${conversation.id})}"
                   class="project-item project-link-card">
                    <h3 th:text="${otherUser != null and selectedConversation != null and selectedConversation.id == conversation.id ? otherUser.fullName : (conversation.user1.email == #authentication.name ? conversation.user2.fullName : conversation.user1.fullName)}">
                        User Name
                    </h3>

                    <p th:text="${conversation.user1.email == #authentication.name ? conversation.user2.email : conversation.user1.email}">
                        email@example.com
                    </p>
                </a>
            </section>

            <section class="skills-card">
                <div th:if="${selectedConversation == null}" class="empty-state">
                    Select a conversation to view messages.
                </div>

                <div th:if="${selectedConversation != null}">
                    <h2 th:text="${otherUser.fullName}">Other User</h2>
                    <p class="skill-category" th:text="${otherUser.email}">other@email.com</p>

                    <div class="messages-box" style="display:grid; gap:12px; margin:20px 0;">
                        <div th:if="${#lists.isEmpty(messages)}" class="empty-state">
                            No messages yet. Say hello.
                        </div>

                        <div th:each="msg : ${messages}" class="project-item">
                            <h3 th:text="${msg.sender.fullName}">Sender Name</h3>
                            <p th:text="${msg.content}">Message content</p>
                            <small th:text="${#temporals.format(msg.createdAt, 'dd MMM yyyy - hh:mm a')}">11 Apr 2026 - 08:00 PM</small>
                        </div>
                    </div>

                    <form th:action="@{/messages/send}" method="post" class="auth-form">
                        <input type="hidden" name="conversationId" th:value="${selectedConversation.id}">

                        <div class="form-group">
                            <label>Message</label>
                            <textarea name="content" rows="4" placeholder="Write your message..." required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
            </section>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
