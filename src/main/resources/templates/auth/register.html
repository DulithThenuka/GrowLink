<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Register - GrowLink')}"></head>
<link rel="stylesheet" th:href="@{/css/auth.css}">
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="auth-page">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p>Join GrowLink and start learning, connecting, and building.</p>

        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <form th:action="@{/register}" th:object="${registerDto}" method="post" class="auth-form">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:field="*{fullName}" placeholder="Enter your full name">
                <small class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></small>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" placeholder="Enter your email">
                <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="Enter your password">
                <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" th:field="*{confirmPassword}" placeholder="Confirm your password">
                <small class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Register</button>
        </form>

        <p class="auth-switch">
            Already have an account?
            <a th:href="@{/login}">Login</a>
        </p>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
