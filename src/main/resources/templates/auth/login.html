<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login - GrowLink')}"></head>
<link rel="stylesheet" th:href="@{/css/auth.css}">
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="auth-page">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Login to continue your GrowLink journey.</p>

        <div th:if="${param.error}" class="alert alert-error">
            Invalid email or password.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="username" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Login</button>
        </form>

        <p class="auth-switch">
            Don’t have an account?
            <a th:href="@{/register}">Create one</a>
        </p>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
