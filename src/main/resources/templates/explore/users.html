<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Explore Users - GrowLink')}"></head>
<link rel="stylesheet" th:href="@{/css/projects.css}">
<link rel="stylesheet" th:href="@{/css/profile.css}">
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main class="projects-page">
    <div class="container">

        <div class="projects-topbar">
            <div>
                <h1>Explore Users</h1>
                <p>Find people by name or headline and discover who you may want to connect with.</p>
            </div>

            <a th:href="@{/connections}" class="btn btn-secondary">My Connections</a>
        </div>

        <form method="get" th:action="@{/explore/users}" class="search-bar explore-user-search">
            <input type="text"
                   name="keyword"
                   placeholder="Search by name or headline"
                   th:value="${keyword}">
            <button type="submit" class="btn btn-primary">Search</button>
        </form>

        <section class="skills-card all-projects-section">
            <h2>People on GrowLink</h2>

            <div th:if="${#lists.isEmpty(users)}" class="empty-state">
                No users matched your search. Try another keyword.
            </div>

            <div class="projects-grid">
                <div th:each="user : ${users}" class="project-item explore-user-card">

                    <div class="explore-user-top">
                        <div class="explore-user-avatar">
                            <img th:if="${user.profileImage != null and !#strings.isEmpty(user.profileImage)}"
                                 th:src="@{${user.profileImage}}"
                                 alt="Profile Image">

                            <span th:if="${user.profileImage == null or #strings.isEmpty(user.profileImage)}"
                                  th:text="${#strings.substring(user.fullName,0,1)}">U</span>
                        </div>

                        <div class="explore-user-info">
                            <h3 th:text="${user.fullName}">User Name</h3>

                            <p class="skill-category"
                               th:text="${user.headline != null and !#strings.isEmpty(user.headline) ? user.headline : 'No headline added yet'}">
                                Headline
                            </p>

                            <p th:text="${user.location != null and !#strings.isEmpty(user.location) ? user.location : 'No location added'}">
                                Location
                            </p>
                        </div>
                    </div>

                    <p class="explore-description"
                       th:text="${user.bio != null and user.bio.length() > 160 ? #strings.substring(user.bio, 0, 160) + '...' : (user.bio != null and !#strings.isEmpty(user.bio) ? user.bio : 'No bio added yet.')}">
                        Bio
                    </p>

                    <div class="explore-meta">
                        <span>
                            <i class="fa-regular fa-envelope"></i>
                            <span th:text="${user.email}">user@email.com</span>
                        </span>
                    </div>

                    <div class="explore-actions">
                        <a th:href="@{/profile/{id}(id=${user.id})}" class="btn btn-primary">View Profile</a>
                    </div>
                </div>
            </div>
        </section>

    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
